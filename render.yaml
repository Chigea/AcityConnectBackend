services:
  - type: web
    name: acity-connect-api
    env: node
    plan: starter
    rootDir: backend
    autoDeploy: true
    buildCommand: npm install --no-audit --no-fund && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "22.12.1"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_EMAIL_DOMAIN
        value: acity.edu.gh

databases:
  - name: acity-connect-db
    databaseName: acity_connect
    user: acity_admin
    plan: starter
